run_id: reduce_ac_benchmark_large_baseline

report_dir: reports
trace_h5: artifacts/traces/ac_benchmark_large_trace.h5

reduction:
  mode: baseline

qoi:
  species_last: [H2, C2H2, X_T(s), C_bulk]
  species_max: [H, CH3, H_T(s)]
  species_integral: [H2, C2H2, H_T(s)]
  deposition_integral: [C_bulk, C_D(s)]

evaluation:
  rel_tolerance: 0.40
  rel_eps: 1.0e-12
  contract:
    version: "v1"
    enforce: true
    invariants_profile: strict_physical_v1
    evaluation_profile: tiered_v35
    run_policy_profile: adaptive_kfold_strict_v1
    diagnostic_schema_strict: true
  metric_taxonomy:
    source: shared_yaml
    path: configs/evaluation/metric_taxonomy_profiles.yaml
    profile: large_default_v1
  non_regression:
    reaction_reduction_priority: true
    max_reaction_reduction_drop_ratio: 0.02
  gate_metric_validity:
    validity_scope: coverage_only
    mandatory_validity_basis: coverage_evaluable
    mandatory_gate_unit_min_evaluable_case_ratio_shadow: 0.25
    max_metric_clip_ratio: 0.80
    min_guardrail_trigger_ratio: 0.02
    mandatory_hard_mode: min_valid_count
    mandatory_metric_validity_mode: case_pass_rate
    mandatory_metric_case_pass_min: null
    mandatory_valid_unit_mode: species_family_quorum
    mandatory_species_family_score_mode: weighted
    mandatory_species_family_case_pass_min: 0.67
    min_valid_mandatory_count_abs: 2
    min_valid_mandatory_ratio: 0.67
    min_valid_mandatory_cap_by_total: true
  gate_metric_tiers:
    mandatory:
      - X_last:H2
      - X_last:C2H2
      - X_last:X_T(s)
      - X_last:C_bulk
      - X_max:H
      - X_max:CH3
      - X_max:H_T(s)
      - X_int:H2
      - X_int:C2H2
      - X_int:H_T(s)
      - dep_int:C_bulk
      - dep_int:C_D(s)
    optional:
      - ignition_delay
      - T_max
      - T_last
  error_aggregation:
    mode: tiered
    require_explicit_thresholds: true
    mandatory_error_include_validity: false
    mandatory_case_pass_min: 0.75
    mandatory_case_mode: ratio_mean
    mandatory_case_unit_weight_mode: family_weighted
    mandatory_quality_scope: valid_only
    mandatory_tail_scope: quality_scope
    mandatory_mean_mode: winsorized
    mandatory_winsor_cap_multiplier: 3.0
    mandatory_outlier_multiplier: 5.0
    mandatory_outlier_ratio_max: 0.20
    mandatory_tail_guard_policy: conditional_hard
    mandatory_tail_activation_ratio_min: 0.10
    mandatory_tail_exceed_ref: tail_max
    mandatory_tail_guard_mode: p95
    mandatory_tail_rel_diff_max: 1.50
    mandatory_tail_min_samples: 8
    mandatory_mean_aggregation: family_weighted
    mandatory_family_weights:
      X_last: 0.50
      X_max: 0.20
      X_int: 0.20
      dep_int: 0.10
      default: 1.0
    optional_metric_pass_min: 0.75
    max_mean_rel_diff_mandatory: 0.40
    max_mean_rel_diff_optional: 0.60
    optional_weight: 0.35
  metric_normalization:
    denominator_mode: max_abs_or_floor
    metric_family_abs_floor:
      X_last: 1.0e-9
      X_max: 1.0e-12
      X_int: 1.0e-10
      dep_int: 1.0e-10
      T: 1.0e-3
      ignition_delay: 1.0e-6
      default: 1.0e-12
    low_signal_case_ratio_threshold: 0.75
    low_signal_policy: score_only
  qoi_builtin_metrics:
    include_temperature_metrics: true
    include_ignition_delay: true
  surrogate_drift:
    selection_use_raw_drift: true
    raw_drift_cap_for_selection: 2.0
    keep_effective_drift_cap_for_eval: 1.30
  compression_optimizer:
    enabled: true
    mode: deterministic_grid
    per_stage_extra_trials: 2
    reaction_priority: true
    max_allowed_mandatory_mean_delta: 1.0e-6
    max_allowed_optional_mean_delta: 1.0e-6
    max_allowed_mandatory_pass_rate_drop: 0.0
    require_gate_passed: true
    require_structure_passed: true
  surrogate_split:
    mode: adaptive_kfold
    enforce_explicit_policy: true
    kfold_policy:
      min_cases_for_kfold: 4
      default_k: 2
      k_by_case_count: {6: 3, 8: 3}
    cost_control:
      max_effective_folds: 3
      early_stop_on_stable_fail: false
      stable_fail_streak: 2
      stable_fail_pass_rate_max: 0.50
      stable_fail_mean_rel_min: 0.40
  physical_gate:
    enabled: true
    max_conservation_violation: 5.0e-3
    max_negative_steps: 0
  runtime_control:
    heartbeat_sec: 10
    no_progress_timeout_sec: 1800
    max_wallclock_sec: 7200

surrogate:
  model: linear_ridge
  l2: 1.0e-6
  perturb_gain: 1.0
  blend_reference: 0.0

gate:
  min_pass_rate: 0.75
  max_mean_rel_diff: 0.40
  max_conservation_violation: 0.005

selection:
  policy: pass_first_pareto
  nonpass_priority: structure_then_score
  tie_breakers: [reaction_reduction, species_reduction, mean_rel_diff]
  weights:
    err: 0.55
    reaction_comp: 0.30
    species_comp: 0.10
    floor_margin: 0.05
    balance_margin: 0.05

balance_constraints:
  enabled: true
  balance_mode: hybrid
  min_reaction_species_ratio: 0.30
  max_reaction_species_ratio: 6.00
  min_active_species_coverage: 0.40
  min_weighted_active_species_coverage: 0.80
  min_essential_species_coverage: 0.80
  min_nu_rank_ratio: 0.30
  essential_species: [H2, C2H2, X_T(s), C_bulk, H, CH3, H_T(s)]
  activity_weights:
    x: 0.25
    wdot: 0.55
    flux: 0.20
  dynamic:
    enabled: true
    complexity_offset_reactions: 100
    complexity_span_reactions: 300
    complexity_min: 0.0
    complexity_max: 1.0
    rules:
      min_reaction_species_ratio:
        slope: -0.04
        floor: 0.24
      max_reaction_species_ratio:
        slope: 1.50
        ceiling: 8.00
      min_active_species_coverage:
        slope: -0.08
        floor: 0.32

physics_constraints:
  phase_mixing_forbidden: true
  surface_site_family_strict: true
  nonnegative_required: true

physics_floors:
  min_reactions_abs: 12
  min_reactions_ratio: 0.03
  min_species_abs: 8
  min_species_ratio: 0.08

merge:
  hard:
    element_overlap_required: true
  overlap_method: jaccard
  soft:
    penalty:
      phase: 0.80
      charge: 0.80
      radical: 0.40
      role: 0.30
  weights:
    elem: 1.0
    frag: 0.8
    flux: 1.2
    role: 0.5

search:
  seed: 7
  merge_search:
    min_pair_score: -0.50
  stages:
    - name: A
      target_ratio: 0.75
      penalty_scale: 1.00
      prune_lambda: 0.001
      prune_keep_ratio: 0.90
      prune_threshold: 0.45
      prune_exact_keep: true
      metric_drift: 1.02
    - name: B
      target_ratio: 0.55
      penalty_scale: 0.70
      prune_lambda: 0.004
      prune_keep_ratio: 0.70
      prune_threshold: 0.40
      prune_exact_keep: true
      metric_drift: 1.08
    - name: C
      target_ratio: 0.35
      penalty_scale: 0.40
      prune_lambda: 0.010
      prune_keep_ratio: 0.50
      prune_threshold: 0.35
      prune_exact_keep: true
      metric_drift: 1.15
